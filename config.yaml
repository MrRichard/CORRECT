dicom_listener:
  # Host IP address to listen for incoming DICOM connections
  host: 0.0.0.0
  # TCP port for the DICOM listener
  port: 11112
  # AE Title for the DICOM listener
  ae_title: CORRECT
  # Save incoming instances using the negotiated transfer syntax
  config_negotiated_transfer_syntax: true

dicom_destination:
  # IP address of the remote DICOM destination
  ip: 152.11.105.71
  # TCP port of the remote DICOM destination
  port: 4242
  # AE Title of the remote DICOM destination
  ae_title: RADIORIIPL

directories:
  # Working directory for incoming studies
  working: ~/CORRECT_working
  # Log directory for application and transaction logs
  logs: ~/CORRECT_logs
  # Quarantine folder created under the working directory
  quarantine_subdir: quarantine

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  application_log_file: application.log
  transaction_log_file: transaction.log
  transaction_log_format: "%(asctime)s TXN [%(levelname)s]: %(message)s"

features:
  # Output and processing checklist. Default behavior is enabled for testing.
  send_original_series: true
  create_augmented_series: true
  create_gsps: true
  create_segmentation_export: true
  create_secondary_capture: true
  generate_jpg_visualizations: true

watcher:
  debounce_interval_seconds: 60
  min_file_count_for_processing: 10

processing:
  # A list of case-insensitive substrings. Contours with names containing these will be ignored.
  ignore_contour_names_containing: ["skull"]

  # Overlay series settings.
  overlay_series_number: 999
  overlay_series_description: "RESEARCH ONLY: Unapproved Treatment Plan CT w Mask"
  overlay_study_id: "RTPlanShare"

  # GSPS settings. GSPS creation is attempted automatically whenever overlay files exist.
  gsps_series_number: 100
  # Recommended overlay display colour as DICOM-scaled CIELab [L, a, b].
  gsps_overlay_color_cielab: [34895, 53534, 50196]

  # Burn-in settings for the augmented overlay series.
  add_burn_in_disclaimer: true
  burn_in_text: "FOR RESEARCH USE ONLY - NOT FOR CLINICAL USE"

  # Segmentation series settings.
  segmentation_series_number: 200
  segmentation_series_description_template: "RESEARCH USE ONLY: CONTOUR {}"
  segmentation_algorithm_name: "Radiation Oncologist"
  segmentation_algorithm_version: "v1.0"
  segmentation_tracking_id: "FOR RESEARCH USE ONLY"

  # Derived RGB Secondary Capture export.
  sc_series_number: 300
  sc_series_description: "SC: Contour Overlay Visualization"

anonymization:
  # apply_site_code: generates a site-coded anonymized ID (e.g. WFU_0001_20240101) and
  # replaces PatientID and PatientName with it. Requires site_code and pid_mapping_file.
  apply_site_code: true
  # apply_anonymization_rules: removes or blanks tags listed under rules.remove_tags /
  # rules.blank_tags, independent of whether apply_site_code is enabled.
  apply_anonymization_rules: true
  site_code: WFU
  pid_mapping_file: /mnt/shared/pid_mapping.json
  study_description: "CORRECT Study Treatment Plan"
  rules:
    remove_tags:
      - AccessionNumber
      - ReferringPhysicianName
      - OtherPatientIDs
      - PatientBirthDate
      - PatientWeight
      - PatientAge
      - PatientAddress
      - PatientTelephoneNumbers
      - OtherPatientNames
      - PatientMotherBirthName
      - ReferringPhysicianAddress
      - ReferringPhysicianTelephoneNumbers
      - PhysiciansOfRecord
      - OperatorsName
      - InstitutionName
      - InstitutionAddress
      - PerformingPhysicianName
      - RequestingPhysician
    blank_tags: []
    generate_random_id_prefix: ""

reporting:
  # Processing reports are written here.
  output_directory: /mnt/shared
