<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="518px" preserveAspectRatio="none" style="width:635px;height:518px;background:#FFFFFF;" version="1.1" viewBox="0 0 635 518" width="635px" zoomAndPan="magnify"><title>CORRECT &#8212; How It Works</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="318.0547" x="157.1313" y="35.4209">CORRECT &#8212; How It Works</text></g><ellipse cx="275.1018" cy="61.6094" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#F5F5F5" height="72.3828" rx="12.5" ry="12.5" style="stroke:#999999;stroke-width:1;" width="236.8994" x="156.6521" y="91.6094"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="216.8994" x="166.6521" y="115.5327">Radiation Oncologist exports</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="171.1011" x="166.6521" y="132.9937">CT scan + RT contours</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="197.7832" x="166.6521" y="150.4546">from planning workstation</text><path d="M419.4292,188.9922 L419.4292,216.1836 L399.4292,220.1836 L419.4292,224.1836 L419.4292,251.375 A0,0 0 0 0 419.4292,251.375 L628.3174,251.375 A0,0 0 0 0 628.3174,251.375 L628.3174,198.9922 L618.3174,188.9922 L419.4292,188.9922 A0,0 0 0 0 419.4292,188.9922" fill="#FFFDE7" style="stroke:#CCCCCC;stroke-width:1;"/><path d="M618.3174,188.9922 L618.3174,198.9922 L628.3174,198.9922 L618.3174,188.9922" fill="#FFFDE7" style="stroke:#CCCCCC;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="175.708" x="425.4292" y="207.9155">Research label applied.</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="187.8882" x="425.4292" y="225.3765">Patient data anonymized</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="99.3091" x="425.4292" y="242.8374">if configured.</text><rect fill="#F5F5F5" height="72.3828" rx="12.5" ry="12.5" style="stroke:#999999;stroke-width:1;" width="248.6548" x="150.7744" y="183.9922"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="228.6548" x="160.7744" y="207.9155">CORRECT receives the images</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="225.52" x="160.7744" y="225.3765">and generates visual overlays</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="226.2744" x="160.7744" y="242.8374">showing contours on CT slices</text><polygon fill="#FFF9C4" points="170.8745,276.375,379.3291,276.375,391.3291,288.375,379.3291,300.375,170.8745,300.375,158.8745,288.375,170.8745,276.375" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="208.4546" x="170.8745" y="293.5679">How is CORRECT deployed?</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="153.8745" x="5" y="284.8374">External PACS mode</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="141.1523" x="391.3291" y="284.8374">Local viewer mode</text><rect fill="#D6EAF8" height="54.9219" rx="12.5" ry="12.5" style="stroke:#999999;stroke-width:1;" width="236.8408" x="30.4541" y="310.375"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="216.8408" x="40.4541" y="334.2983">Processed images forwarded</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="206.3672" x="40.4541" y="351.7593">to the Clinical PACS system</text><rect fill="#D6EAF8" height="54.9219" rx="12.5" ry="12.5" style="stroke:#999999;stroke-width:1;" width="225.0342" x="36.3574" y="385.2969"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="205.0342" x="46.3574" y="409.2202">Radiologist reviews images</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="184.8267" x="46.3574" y="426.6812">on the PACS workstation</text><rect fill="#E8DAEF" height="54.9219" rx="12.5" ry="12.5" style="stroke:#999999;stroke-width:1;" width="208.1079" x="297.2751" y="310.375"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="188.1079" x="307.2751" y="334.2983">Processed images stored</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="170.7202" x="307.2751" y="351.7593">in local Orthanc server</text><rect fill="#E8DAEF" height="54.9219" rx="12.5" ry="12.5" style="stroke:#999999;stroke-width:1;" width="194.1333" x="304.2625" y="385.2969"/><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="174.1333" x="314.2625" y="409.2202">Radiologist opens OHIF</text><text fill="#000000" font-family="Verdana" font-size="15" lengthAdjust="spacing" textLength="128.5327" x="314.2625" y="426.6812">in a web browser</text><polygon fill="#FFF9C4" points="275.1018,446.2188,287.1018,458.2188,275.1018,470.2188,263.1018,458.2188,275.1018,446.2188" style="stroke:#999999;stroke-width:1;"/><ellipse cx="275.1018" cy="501.2188" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="275.1018" cy="501.2188" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#555555;stroke-width:1;" x1="275.1018" x2="275.1018" y1="71.6094" y2="91.6094"/><polygon fill="#555555" points="271.1018,81.6094,275.1018,91.6094,279.1018,81.6094,275.1018,85.6094" style="stroke:#555555;stroke-width:1;"/><line style=