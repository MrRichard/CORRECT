services:
  correct:
    build:
      context: .
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: correct_pacs
    restart: unless-stopped
    ports:
      - "11112:11112"
    command: python main.py --config /app/config/config.yaml
    environment:
      - WATCHDOG_USE_POLLING=false
    volumes:
      - ./pacs-config/config.pacs.yaml:/app/config/config.yaml:ro
      - ~/CORRECT_PACS/data/working:/home/appuser/CORRECT_working:rw,z
      - ~/CORRECT_PACS/data/logs:/home/appuser/CORRECT_logs:rw,z
      - ~/CORRECT_PACS/data/output:/mnt/shared
    networks:
      - pacs_network
    depends_on:
      - orthanc

  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: correct_orthanc
    restart: unless-stopped
    ports:
      - "8042:8042"   # Orthanc web UI and DICOMweb — exposed to host
      - "4242:4242"   # Port 4242 (DICOM) is internal only; CORRECT routes to it by service name
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - ./pacs-config/orthanc.json:/etc/orthanc/orthanc.json:ro
    networks:
      - pacs_network

volumes:
  orthanc_data:

networks:
  pacs_network:
    driver: bridge
